name: weedtip
description: 'Weedtip — cannabis dispensary discovery and ordering (iOS + Android).'
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  # Supabase — shares the same project/config approach as the web app.
  supabase_flutter: ^2.8.0
  # Navigation
  go_router: ^14.6.2
  # State management
  flutter_riverpod: ^2.6.1
  # Env / config
  flutter_dotenv: ^5.2.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    # NOTE: not a dotfile — Flutter's asset bundler skips leading-dot filenames,
    # which silently breaks dotenv on web. Keep the config asset un-dotted.
    - assets/config.env
