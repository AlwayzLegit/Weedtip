name: Enrich dispensary logos

# Progressively replaces missing/derived dispensary logos with the real logo
# scraped from each shop's own website (uploaded to the public dispensary-media
# bucket). Runs in nightly batches so the whole directory fills over time
# without hammering any host; also runnable on demand.
#
# Requires one repo secret:
#   SUPABASE_SERVICE_ROLE_KEY  — service-role key (bypasses RLS to write logo_url)
# Optional repo variable:
#   SUPABASE_URL               — defaults to the prod project URL below.

on:
  schedule:
    - cron: '0 8 * * *' # 08:00 UTC nightly
  workflow_dispatch:
    inputs:
      limit:
        description: 'How many shops to process this run'
        required: false
        default: '250'
      refresh:
        description: 'Also revisit favicon-derived logos (not just missing)'
        type: boolean
        required: false
        default: false

concurrency:
  group: enrich-logos
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm --filter @weedtip/web exec playwright install --with-deps chromium

      - name: Run logo enrichment
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL || 'https://ggpnghpcclngqkyelkes.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY secret is not set — add it in repo Settings → Secrets."
            exit 1
          fi
          node scripts/enrich-dispensary-logos.mjs \
            --limit "${{ github.event.inputs.limit || '250' }}" \
            ${{ github.event.inputs.refresh == 'true' && '--refresh' || '' }}
