name: Enrich dispensary menus

# Best-effort menu seeding: scrapes each shop's own website for products and
# upserts them into the (near-empty) products table so listings aren't thin.
# Nightly small batches + on-demand. See scripts/enrich-dispensary-menus.mjs.
#
# Requires repo secret SUPABASE_SERVICE_ROLE_KEY. Optional var SUPABASE_URL.

on:
  schedule:
    - cron: '30 8 * * *' # 08:30 UTC nightly (after the logo run)
  workflow_dispatch:
    inputs:
      limit:
        description: 'How many shops to process this run'
        required: false
        default: '80'
      refresh:
        description: 'Re-harvest shops that already have products'
        type: boolean
        required: false
        default: false

concurrency:
  group: enrich-menus
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 22+: @supabase/supabase-js needs native WebSocket (Node 20 throws).
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm --filter @weedtip/web exec playwright install --with-deps chromium

      - name: Run menu enrichment
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL || 'https://ggpnghpcclngqkyelkes.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY secret is not set — add it in repo Settings → Secrets."
            exit 1
          fi
          node scripts/enrich-dispensary-menus.mjs \
            --limit "${{ github.event.inputs.limit || '80' }}" \
            ${{ github.event.inputs.refresh == 'true' && '--refresh' || '' }}
